<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N Minute Timer</title>
  <style>
    :root {
      color-scheme: dark;
      --fg-dark: #1a1340;
      --fg-light: #fffbe6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0a0a2b;
    }

    body {
      font-family: "Helvetica Neue", "Hiragino Sans", system-ui, sans-serif;
      color: var(--fg-light);
    }

    #scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      transition: background 600ms linear;
    }

    #sky-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      font-size: clamp(80px, 13vw, 180px);
      font-variant-numeric: tabular-nums;
      font-weight: 200;
      letter-spacing: 0;
      line-height: 0.95;
      pointer-events: none;
      text-align: center;
      transition: color 600ms linear, text-shadow 600ms linear;
    }

    #controls {
      position: absolute;
      bottom: 36px;
      left: 50%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
      transform: translateX(-50%);
      transition: background 600ms linear, color 600ms linear, border 600ms linear;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    #controls .divider {
      width: 1px;
      height: 26px;
    }

    #min-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 8px 0 16px;
    }

    #minutes-input {
      width: 56px;
      padding: 4px 6px;
      border-radius: 6px;
      color: inherit;
      font: inherit;
      font-size: 24px;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      outline: none;
      text-align: right;
    }

    #minutes-input::-webkit-outer-spin-button,
    #minutes-input::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    #minutes-input {
      -moz-appearance: textfield;
    }

    #minutes-input:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .step-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    button {
      color: inherit;
      cursor: pointer;
      font: inherit;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }

    .step {
      display: inline-flex;
      width: 18px;
      height: 14px;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 4px;
      background: transparent;
      font-size: 8px;
      line-height: 1;
      opacity: 0.85;
    }

    .icon-btn {
      display: inline-flex;
      width: 40px;
      height: 40px;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
    }

    .icon-btn.ghost {
      background: transparent;
    }

    .light #display {
      color: var(--fg-dark);
      text-shadow: 0 4px 30px rgba(255, 255, 255, 0.4);
    }

    .dark #display {
      color: var(--fg-light);
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.45);
    }

    .light #controls {
      border: 1px solid rgba(26, 19, 64, 0.18);
      background: rgba(255, 251, 230, 0.6);
      color: var(--fg-dark);
    }

    .dark #controls {
      border: 1px solid rgba(255, 251, 230, 0.18);
      background: rgba(20, 18, 40, 0.55);
      color: var(--fg-light);
    }

    .light .step {
      border: 1px solid rgba(26, 19, 64, 0.18);
    }

    .dark .step {
      border: 1px solid rgba(255, 251, 230, 0.18);
    }

    .light #minutes-input {
      border: 1px dashed rgba(26, 19, 64, 0.18);
      background: rgba(26, 19, 64, 0.04);
    }

    .dark #minutes-input {
      border: 1px dashed rgba(255, 251, 230, 0.18);
      background: rgba(255, 251, 230, 0.06);
    }

    .light .divider {
      background: rgba(26, 19, 64, 0.18);
    }

    .dark .divider {
      background: rgba(255, 251, 230, 0.18);
    }

    .light .icon-btn.primary {
      background: var(--fg-dark);
      color: var(--fg-light);
    }

    .dark .icon-btn.primary {
      background: var(--fg-light);
      color: var(--fg-dark);
    }

    .light .icon-btn.ghost {
      border: 1px solid rgba(26, 19, 64, 0.18);
    }

    .dark .icon-btn.ghost {
      border: 1px solid rgba(255, 251, 230, 0.18);
    }

    @media (max-width: 520px) {
      #display {
        font-size: clamp(64px, 19vw, 96px);
      }

      #controls {
        bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <main id="scene" class="light" aria-label="N minute timer">
    <svg id="sky-svg" preserveAspectRatio="none" aria-hidden="true">
      <path id="arc-bg" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5" stroke-dasharray="2 7" stroke-linecap="round"></path>
      <path id="arc-fg" fill="none" stroke="#ffe9b0" stroke-width="3" pathLength="1" stroke-dasharray="1" stroke-linecap="round" opacity="0.85"></path>
      <circle id="dot-start" r="5" fill="rgba(255,255,255,0.6)"></circle>
      <circle id="dot-end" r="5" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"></circle>
      <defs>
        <linearGradient id="water-grad" x1="0" y1="0" x2="0" y2="1">
          <stop id="water-top" offset="0" stop-color="#000"></stop>
          <stop id="water-bot" offset="1" stop-color="#000"></stop>
        </linearGradient>
      </defs>
      <rect id="water" fill="url(#water-grad)"></rect>
      <line id="horizon" stroke-width="1" opacity="0.55"></line>
      <circle id="sun-halo" fill="#ff5a2c" opacity="0.18" r="80"></circle>
      <circle id="sun-glow" fill="#ff5a2c" opacity="0.4" r="50"></circle>
      <circle id="sun-core" fill="#ffe9b0" r="32"></circle>
    </svg>

    <div id="display" aria-live="polite">05:00</div>

    <section id="controls" aria-label="Timer controls">
      <div id="min-wrap">
        <input id="minutes-input" type="number" min="1" max="999" step="1" value="5" aria-label="分">
        <div class="step-col">
          <button class="step" id="step-up" type="button" aria-label="1分増やす">▲</button>
          <button class="step" id="step-down" type="button" aria-label="1分減らす">▼</button>
        </div>
      </div>
      <div class="divider"></div>
      <button class="icon-btn primary" id="start-button" type="button" aria-label="スタート">▶</button>
      <button class="icon-btn ghost" id="reset-button" type="button" aria-label="リセット">↺</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
