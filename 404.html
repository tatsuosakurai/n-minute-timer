<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N Minute Timer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe6;
      --panel: rgba(255, 252, 246, 0.92);
      --text: #1f2933;
      --muted: #52606d;
      --accent: #c05621;
      --accent-strong: #9c4221;
      --accent-soft: #fbd38d;
      --border: rgba(31, 41, 51, 0.12);
      --shadow: 0 24px 60px rgba(31, 41, 51, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "Hiragino Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(251, 211, 141, 0.7), transparent 32%),
        radial-gradient(circle at bottom right, rgba(192, 86, 33, 0.18), transparent 30%),
        linear-gradient(160deg, #fffaf2 0%, var(--bg) 55%, #efe7d9 100%);
    }

    .timer {
      width: min(100%, 480px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 0.95;
    }

    .display {
      margin: 0 0 24px;
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .status {
      min-height: 1.5em;
      margin: 0 0 20px;
      text-align: center;
      color: var(--muted);
    }

    .controls {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font: inherit;
      font-size: 1.1rem;
      color: var(--text);
      background: #fff;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    button {
      padding: 14px 16px;
      border: none;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: var(--accent);
      color: #fffaf4;
    }

    .secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .ghost {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .done {
      color: var(--accent-strong);
    }

    @media (max-width: 520px) {
      .timer {
        padding: 24px;
      }

      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="timer">
    <p class="eyebrow">GitHub Pages Ready</p>
    <h1>N Minute Timer</h1>
    <div class="display" id="display" aria-live="polite">05:00</div>
    <p class="status" id="status">Set minutes and press start.</p>

    <section class="controls" aria-label="Timer controls">
      <label for="minutes-input">
        Minutes
        <input id="minutes-input" type="number" min="1" max="999" step="1" value="5">
      </label>

      <div class="button-row">
        <button class="primary" id="start-button" type="button">Start</button>
        <button class="secondary" id="pause-button" type="button" disabled>Pause</button>
        <button class="ghost" id="reset-button" type="button">Reset</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
